<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA Dünya Kupası 2026  Tahmin Oyunu</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   SIMULATION-CORE THEME — FIFA WC 2026 PREDICTION LEAGUE
   Base: Carbon Black (#050a14) / Deep Navy (#0d1f3c)
   Accent: Orange (#FF6B00) replaces Gold
   Data font: JetBrains Mono | UI: Inter | Display: Outfit
═══════════════════════════════════════════════════════════ */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* ── Core Palette ── */
  --bg0:#050a14;          /* Carbon Black */
  --bg1:#0a1628;          /* Deep space */
  --bg2:#0f2040;          /* Deep Navy */
  --bg3:#152848;          /* Navy lifted */

  /* ── Orange accent (replaces gold) ── */
  --or:#FF6B00;
  --orl:#FF8C35;
  --ord:rgba(255,107,0,.12);
  --or-glow:rgba(255,107,0,.18);

  /* ── Warm amber (was gold in template) ── */
  --gold:#FF6B00;
  --goldd:rgba(255,107,0,.1);

  /* ── Borders — subtle navy (#1e293b clone) ── */
  --br:#1e2d45;
  --bro:rgba(255,107,0,.28);
  --br-bright:#2a3f5e;

  /* ── Typography ── */
  --tp:#E8EEF6;
  --ts:#7A90B0;
  --tm:#3D5470;
  --green:#22D66A;
  --red:#FF4560;
  --blue:#3B9EFF;
  --purple:#9D78FF;
  --cyan:#00D4FF;

  /* ── Font families ── */
  --f-display:'Bebas Neue',sans-serif;
  --f-head:'Outfit',sans-serif;
  --f-ui:'Inter',sans-serif;
  --f-mono:'JetBrains Mono',monospace;
}

html,body{height:100%}
body{
  background:var(--bg0);
  color:var(--tp);
  font-family:var(--f-ui);
  font-size:14px;
  line-height:1.5;
  overflow-x:hidden;
  /* Subtle scanline grid */
  background-image:
    linear-gradient(rgba(30,45,69,.25) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30,45,69,.25) 1px, transparent 1px);
  background-size:40px 40px;
  background-attachment:fixed;
}
#root{min-height:100vh}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--br-bright);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,107,0,.4)}

/* ─────────────────────────── BUTTONS ─────────────────────────── */
.btn-p{
  display:block;width:100%;
  background:var(--or);
  color:#fff;border:1px solid var(--or);
  border-radius:4px;
  padding:13px 20px;
  font-family:var(--f-display);
  font-size:16px;letter-spacing:.2em;
  cursor:pointer;
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
  margin-top:6px;
  text-transform:uppercase;
  position:relative;overflow:hidden;
}
.btn-p::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%);
  opacity:0;transition:opacity .2s;
}
.btn-p:hover{
  transform:scale(1.025) translateY(-1px);
  box-shadow:0 0 28px var(--or-glow),0 8px 24px rgba(0,0,0,.4);
  background:var(--orl);
}
.btn-p:hover::before{opacity:1}
.btn-p:active{transform:scale(.99);box-shadow:none}
.btn-p:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

.btn-sm{
  background:var(--or);color:#fff;
  border:1px solid var(--or);
  border-radius:3px;
  padding:8px 16px;
  font-family:var(--f-display);font-size:13px;letter-spacing:.18em;
  cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);
  flex-shrink:0;text-transform:uppercase;
}
.btn-sm:hover{
  transform:scale(1.04) translateY(-1px);
  box-shadow:0 0 18px var(--or-glow),0 4px 14px rgba(0,0,0,.4);
  background:var(--orl);border-color:var(--orl);
}
.btn-sm:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

.btn-sm-ghost{
  background:transparent;color:var(--ts);
  border:1px solid var(--br);border-radius:3px;
  padding:7px 13px;font-family:var(--f-ui);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;
}
.btn-sm-ghost:hover{border-color:var(--or);color:var(--or);background:var(--ord)}

.btn-g{
  display:block;width:100%;background:transparent;
  color:var(--or);border:1px solid var(--bro);
  border-radius:4px;padding:11px 20px;
  font-family:var(--f-ui);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;margin-top:10px;
  letter-spacing:.06em;
}
.btn-g:hover{
  background:var(--ord);border-color:var(--or);
  box-shadow:0 0 12px var(--or-glow);
  transform:translateY(-1px);
}

.btn-d{
  display:block;width:100%;background:transparent;
  color:var(--red);border:1px solid rgba(255,69,96,.22);
  border-radius:3px;padding:9px;
  font-family:var(--f-ui);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;
}
.btn-d:hover{background:rgba(255,69,96,.07);border-color:rgba(255,69,96,.4)}

/* ─────────────────────────── INPUTS ─────────────────────────── */
.field{margin-bottom:14px}
.field label{
  display:block;font-size:10px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--tm);margin-bottom:6px;font-family:var(--f-mono);
}
.field input,.field select{
  width:100%;background:rgba(13,31,60,.8);
  border:1px solid var(--br);border-radius:3px;
  padding:11px 14px;color:var(--tp);
  font-family:var(--f-ui);font-size:14px;
  outline:none;transition:border-color .2s,box-shadow .2s,background .2s;
  -webkit-appearance:none;
}
.field input::placeholder{color:var(--tm)}
.field input:focus,.field select:focus{
  border-color:var(--or);
  box-shadow:0 0 0 3px rgba(255,107,0,.1),inset 0 0 20px rgba(255,107,0,.03);
  background:rgba(255,107,0,.04);
}
.field select option{background:#0a1628}

/* ── Score input ── */
.score-box{
  width:56px;height:56px;text-align:center;
  font-family:var(--f-mono);font-size:28px;font-weight:700;
  background:rgba(13,31,60,.8);
  border:1px solid var(--br);border-radius:3px;
  color:var(--tp);outline:none;
  transition:border-color .25s,box-shadow .25s;
  -moz-appearance:textfield;cursor:pointer;
  letter-spacing:0;
}
.score-box::-webkit-outer-spin-button,.score-box::-webkit-inner-spin-button{-webkit-appearance:none}
.score-box:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(255,107,0,.12),inset 0 0 16px rgba(255,107,0,.06)}
.score-box:disabled{opacity:.3;cursor:not-allowed}
.score-box.saved{border-color:rgba(255,107,0,.55);background:rgba(255,107,0,.07)}
.score-box.locked{border-color:var(--br);opacity:.5}

/* ─────────────────────────── MESSAGES ─────────────────────────── */
.msg{border-radius:3px;padding:11px 15px;font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;line-height:1.45;border-left:3px solid}
.msg-err{background:rgba(255,69,96,.07);border-color:var(--red);color:#FF8FAF}
.msg-ok{background:rgba(34,214,106,.07);border-color:var(--green);color:#6EF5A8}

/* ─────────────────────────── MISC ─────────────────────────── */
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--tm);font-size:11px;font-family:var(--f-mono);letter-spacing:.1em}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--br)}
.step-bar{display:flex;gap:4px;margin-bottom:20px}
.step-bar span{flex:1;height:2px;border-radius:1px;background:rgba(255,255,255,.07);transition:background .4s}
.step-bar span.active{background:var(--or);box-shadow:0 0 8px var(--or)}
.step-bar span.done{background:var(--green)}
.tl{background:none;border:none;cursor:pointer;color:var(--tm);font-size:12px;text-decoration:none;font-family:var(--f-mono);transition:color .2s;padding:0;border-bottom:1px solid var(--br)}
.tl:hover{color:var(--or);border-color:var(--or)}
.info-b{background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.25);border-left:3px solid var(--or);border-radius:3px;padding:10px 14px;font-size:12px;color:rgba(255,155,80,.9);margin-bottom:14px;line-height:1.55;font-family:var(--f-ui)}

/* ─────────────────────────── BG GRID (replaces hex) ─────────────────────────── */
.hex-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.hex-bg::before{
  content:'';position:absolute;
  top:-40%;left:50%;transform:translateX(-50%);
  width:1000px;height:800px;
  background:radial-gradient(ellipse at center,rgba(255,107,0,.07) 0%,rgba(59,158,255,.04) 40%,transparent 70%);
}
.hex-bg::after{
  content:'';position:absolute;
  bottom:-20%;right:-10%;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(59,158,255,.05) 0%,transparent 65%);
}
/* Animated corner accent lines */
.hex{display:none}

/* ─────────────────────────── AUTH SCREEN ─────────────────────────── */
.auth-wrap{
  position:relative;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
}
.auth-card{
  position:relative;
  background:rgba(10,22,40,.95);
  border:1px solid var(--br);
  /* Sharp top-left corner accent */
  border-radius:2px;
  padding:36px 34px 28px;
  width:100%;max-width:420px;
  z-index:1;
  box-shadow:0 0 60px rgba(255,107,0,.05),0 40px 80px rgba(0,0,0,.7);
  overflow:hidden;
  /* Corner accent */
  clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,0 100%);
}
/* Top orange accent bar */
.auth-card::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--or) 0%,var(--orl) 40%,transparent 100%);
  box-shadow:0 0 20px rgba(255,107,0,.4);
}
/* Diagonal corner cut fill */
.auth-card::after{
  content:'';position:absolute;
  top:0;right:0;
  width:0;height:0;
  border-style:solid;
  border-width:0 20px 20px 0;
  border-color:transparent var(--or) transparent transparent;
}
.auth-card--w{max-width:500px;clip-path:polygon(0 0,calc(100% - 24px) 0,100% 24px,100% 100%,0 100%)}
.auth-card--w::after{border-width:0 24px 24px 0}
.auth-line{display:none} /* replaced by ::before */
.auth-media{position:absolute;inset:0;z-index:0;pointer-events:none}
.auth-media video{width:100%;height:100%;object-fit:cover;filter:saturate(.5) brightness(.35) hue-rotate(10deg)}
.auth-media::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,10,20,.7) 0%,rgba(5,10,20,.88) 100%)}
.auth-content{position:relative;z-index:2}

/* ── Logo ── */
.logo{text-align:center;margin-bottom:4px}
.logo-ball{font-size:36px;display:block;margin-bottom:6px;animation:ball 3.5s ease-in-out infinite;filter:drop-shadow(0 0 12px rgba(255,107,0,.5))}
@keyframes ball{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.06) rotate(5deg)}}
.logo-sub{
  font-family:var(--f-mono);font-size:10px;letter-spacing:.35em;
  color:var(--or);text-transform:uppercase;
  text-shadow:0 0 12px rgba(255,107,0,.4);
}
.logo-year{
  font-family:var(--f-display);font-size:48px;letter-spacing:.1em;
  color:var(--tp);line-height:1;
  text-shadow:0 0 40px rgba(255,107,0,.15);
}
.logo-tag{font-size:9px;letter-spacing:.4em;color:var(--tm);text-transform:uppercase;margin-top:4px;font-family:var(--f-mono)}
.logo-sm .logo-ball{font-size:22px}
.logo-sm .logo-sub{font-size:9px;letter-spacing:.25em}
.logo-sm .logo-year{font-size:30px}
.logo-sm .logo-tag{font-size:8px}
.auth-h{text-align:center;margin:18px 0 20px}
.auth-h h2{font-family:var(--f-display);font-size:22px;letter-spacing:.16em;color:var(--tp)}
.auth-h p{font-size:12px;color:var(--ts);margin-top:4px;font-family:var(--f-mono);letter-spacing:.04em}

/* ─────────────────────────── APP SHELL ─────────────────────────── */
.app-root{display:flex;min-height:100vh;position:relative}

.sidebar{
  width:220px;flex-shrink:0;
  background:rgba(8,16,32,.97);
  border-right:1px solid var(--br);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:20;
}
/* Sidebar top orange line */
.sidebar::before{
  content:'';display:block;height:2px;
  background:linear-gradient(90deg,var(--or),var(--orl) 60%,transparent);
  flex-shrink:0;
}

.sb-logo{padding:18px 16px 16px;border-bottom:1px solid var(--br)}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto}

/* Sidebar section label */
.sb-section-label{
  font-family:var(--f-mono);font-size:9px;letter-spacing:.22em;
  color:var(--tm);text-transform:uppercase;
  padding:10px 8px 5px;
}

.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:2px;
  cursor:pointer;font-size:13px;font-weight:500;
  color:var(--ts);border:1px solid transparent;
  transition:all .18s;margin-bottom:2px;
  font-family:var(--f-ui);
  position:relative;
}
.nav-item::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:2px;border-radius:1px;
  background:var(--or);transform:scaleY(0);
  transition:transform .18s;
}
.nav-item:hover{background:rgba(255,107,0,.06);color:var(--tp);border-color:var(--br)}
.nav-item.active{
  background:rgba(255,107,0,.09);color:var(--or);
  border-color:rgba(255,107,0,.2);
}
.nav-item.active::before{transform:scaleY(1)}
.nav-icon{font-size:16px;flex-shrink:0}

.sb-user{padding:12px 8px;border-top:1px solid var(--br)}
.user-badge{
  background:rgba(255,107,0,.06);
  border:1px solid rgba(255,107,0,.2);
  border-radius:2px;padding:10px 12px;margin-bottom:8px;
}
.user-disp{font-family:var(--f-display);font-size:15px;letter-spacing:.1em;color:var(--or)}
.user-un{font-size:11px;color:var(--tm);margin-top:2px;display:flex;align-items:center;gap:6px;font-family:var(--f-mono)}
.badge-admin{
  background:rgba(255,107,0,.15);color:var(--or);
  font-size:8px;font-weight:700;letter-spacing:.12em;
  padding:2px 5px;border-radius:2px;text-transform:uppercase;
  font-family:var(--f-mono);
}

.app-main{margin-left:220px;flex:1;min-height:100vh;padding:26px 30px;position:relative;z-index:1}

.pg-title{
  font-family:var(--f-display);font-size:28px;letter-spacing:.14em;
  color:var(--or);margin-bottom:2px;
  text-shadow:0 0 30px rgba(255,107,0,.2);
}
.pg-sub{
  font-size:11px;color:var(--tm);margin-bottom:22px;
  font-family:var(--f-mono);letter-spacing:.06em;text-transform:uppercase;
}

/* ─────────────────────────── SECTION HEADERS ─────────────────────────── */
.sec-hdr{
  font-family:var(--f-mono);font-size:10px;letter-spacing:.22em;
  color:var(--tm);margin-bottom:10px;
  display:flex;align-items:center;gap:10px;
  text-transform:uppercase;
}
.sec-hdr::before{content:'//';color:var(--or);opacity:.6;font-weight:700}
.sec-hdr::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--br),transparent)}

/* ─────────────────────────── GRIDS ─────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ─────────────────────────── STAT CARDS ─────────────────────────── */
.stat{
  background:rgba(10,22,40,.9);
  border:1px solid var(--br);
  border-radius:2px;padding:14px 16px;
  position:relative;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.stat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--or),transparent);
  opacity:.4;
}
.stat:hover{border-color:var(--br-bright);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.stat-icon{font-size:18px;margin-bottom:6px;opacity:.9}
.stat-lbl{
  font-size:9px;letter-spacing:.2em;color:var(--tm);
  text-transform:uppercase;margin-bottom:3px;font-family:var(--f-mono);
}
.stat-val{
  font-family:var(--f-mono);font-size:26px;font-weight:700;
  letter-spacing:.04em;color:var(--tp);line-height:1;
}
.stat-sub{font-size:10px;color:var(--tm);margin-top:3px;font-family:var(--f-mono)}

/* ─────────────────────────── TABS ─────────────────────────── */
.tabs{
  display:flex;gap:0;
  background:rgba(10,22,40,.8);
  border:1px solid var(--br);border-radius:2px;
  padding:3px;margin-bottom:18px;
}
.tab{
  flex:1;padding:7px 10px;border-radius:2px;border:none;
  background:transparent;color:var(--ts);
  font-family:var(--f-mono);font-size:11px;font-weight:500;
  cursor:pointer;transition:all .18s;text-align:center;
  letter-spacing:.08em;text-transform:uppercase;
}
.tab.active{
  background:var(--or);color:#fff;
  box-shadow:0 0 12px var(--or-glow);
  font-weight:700;
}
.tab:not(.active):hover{
  background:rgba(255,107,0,.08);color:var(--tp);
  box-shadow:0 0 8px rgba(255,107,0,.1);
}

/* ─────────────────────────── HERO COUNTDOWN ─────────────────────────── */
.hero-cd{
  background:rgba(10,22,40,.9);
  border:1px solid var(--br);
  border-radius:2px;padding:20px 22px;margin-bottom:20px;
  position:relative;overflow:hidden;
}
.hero-cd::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--or) 0%,var(--orl) 50%,transparent 100%);
  box-shadow:0 0 16px rgba(255,107,0,.3);
}
.hero-cd::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--br),transparent);
}
.hc-label{
  font-family:var(--f-mono);font-size:10px;letter-spacing:.24em;
  color:var(--tm);text-transform:uppercase;
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.hc-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pg 1.2s infinite;flex-shrink:0;box-shadow:0 0 6px var(--green)}
.hc-time{
  font-family:var(--f-mono);font-size:42px;font-weight:700;
  letter-spacing:.04em;color:var(--or);line-height:1;
  text-shadow:0 0 30px rgba(255,107,0,.3);
}
.hc-sub{font-size:12px;color:var(--ts);margin-top:8px;font-family:var(--f-ui)}
@keyframes pg{0%,100%{opacity:1}50%{opacity:.4}}

/* ─────────────────────────── MATCH CARD ─────────────────────────── */
.match-card{
  background:rgba(10,22,40,.85);
  border:1px solid var(--br);border-radius:2px;
  overflow:hidden;transition:all .2s;
}
.match-card:hover{border-color:rgba(255,107,0,.35);box-shadow:0 0 20px rgba(255,107,0,.07),0 4px 16px rgba(0,0,0,.4);transform:translateY(-1px)}
.match-card.live{border-color:rgba(34,214,106,.4);box-shadow:0 0 18px rgba(34,214,106,.1)}
.match-card.finished{opacity:.65}
.mc-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px 5px;border-bottom:1px solid var(--br);
  background:rgba(5,10,20,.4);
}
.mc-grp{
  font-family:var(--f-mono);font-size:10px;letter-spacing:.18em;
  color:var(--tm);text-transform:uppercase;
}
.mc-time{font-family:var(--f-mono);font-size:11px;font-weight:600;color:var(--ts)}
.mc-time.live-t{color:var(--green);animation:pg 1.4s ease-in-out infinite;text-shadow:0 0 8px var(--green)}
.mc-body{padding:10px 12px}
.mc-teams{display:flex;align-items:center;gap:6px}
.mc-team{flex:1;text-align:center}
.mc-flag{display:flex;justify-content:center;margin-bottom:3px}
.mc-name{font-size:11px;font-weight:600;line-height:1.2;font-family:var(--f-ui)}
.mc-seed{font-family:var(--f-mono);font-size:8px;color:var(--or);font-weight:700;letter-spacing:.08em;margin-top:1px}
.mc-vs{font-family:var(--f-mono);font-size:14px;color:var(--tm);letter-spacing:.12em;flex-shrink:0;font-weight:700}
.mc-score{
  font-family:var(--f-mono);font-size:24px;font-weight:700;
  letter-spacing:.06em;display:flex;align-items:center;gap:4px;flex-shrink:0;
}
.mc-score-sep{font-size:16px;color:var(--tm)}
.mc-bottom{
  padding:4px 12px 8px;
  display:flex;justify-content:space-between;align-items:center;
  border-top:1px solid rgba(30,45,69,.5);margin-top:4px;
}
.mc-cd{font-family:var(--f-mono);font-size:10px;color:var(--ts)}

/* ── Tags ── */
.tag{display:inline-block;font-family:var(--f-mono);font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:2px}
.tag-live{background:rgba(34,214,106,.12);color:var(--green);border:1px solid rgba(34,214,106,.3)}
.tag-lock{background:rgba(255,107,0,.1);color:var(--or);border:1px solid rgba(255,107,0,.3)}
.tag-done{background:rgba(255,255,255,.04);color:var(--ts);border:1px solid var(--br)}
.tag-soon{background:rgba(59,158,255,.1);color:var(--blue);border:1px solid rgba(59,158,255,.25)}
.tag-pred{background:rgba(157,120,255,.1);color:var(--purple);border:1px solid rgba(157,120,255,.25)}

/* ─────────────────────────── SHARED MATCH SCOREBOARD ─────────────────────────── */
.mboard{background:rgba(10,22,40,.8);border:1px solid var(--br);border-radius:2px;padding:9px 11px}
.mboard.live{border-color:rgba(34,214,106,.3)}
.mboard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.mboard-left{display:flex;align-items:center;gap:7px}
.mboard-grp{font-family:var(--f-mono);font-size:10px;letter-spacing:.16em;color:var(--tm)}
.mboard-live{display:inline-flex;align-items:center;gap:4px;padding:2px 6px;border-radius:2px;background:rgba(34,214,106,.12);border:1px solid rgba(34,214,106,.28);color:var(--green);font-family:var(--f-mono);font-size:8px;font-weight:700;letter-spacing:.12em}
.mboard-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pg 1s ease-in-out infinite;box-shadow:0 0 5px var(--green)}
.mboard-time{font-family:var(--f-mono);font-size:10px;color:var(--ts);font-weight:600}
.mboard-date{font-family:var(--f-mono);font-size:9px;color:var(--tm)}
.mboard-body{display:flex;align-items:center;gap:8px}
.mboard-team{flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.mboard-team.right{justify-content:flex-end}
.mboard-name{font-size:12px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--f-ui)}
.mboard-center{min-width:80px;text-align:center}
.mboard-vs{font-family:var(--f-mono);font-size:12px;letter-spacing:.14em;color:var(--tm);font-weight:700}
.mboard-score{font-family:var(--f-mono);font-size:22px;font-weight:700;letter-spacing:.06em;color:var(--tp);display:flex;align-items:center;justify-content:center;gap:4px}
.mboard-score span:nth-child(2){font-size:15px;color:var(--tm)}
.mboard-cd{font-family:var(--f-mono);font-size:18px;font-weight:700;letter-spacing:.06em;color:var(--or);line-height:1.1;text-shadow:0 0 12px rgba(255,107,0,.3)}
.mboard-sub{font-family:var(--f-mono);font-size:9px;color:var(--tm);margin-top:2px}

/* ─────────────────────────── PREDICTION CARDS ─────────────────────────── */
.pred-card{background:rgba(10,22,40,.85);border-radius:2px;overflow:hidden;transition:border-color .25s,transform .22s cubic-bezier(.22,1,.36,1),box-shadow .22s,background .22s;margin-bottom:10px;will-change:transform}
.pred-card.state-open{border:1px solid rgba(34,214,106,.22)}
.pred-card.state-warn{border:1px solid rgba(255,107,0,.45)}
.pred-card.state-locked{border:1px solid var(--br)}
.pred-card.state-finished{border:1px solid rgba(30,45,69,.8);opacity:.8}
.pred-card:hover{
  transform:translateY(-2px) scale(1.01);
  border-color:rgba(212,175,55,.5);
  background:linear-gradient(180deg,rgba(212,175,55,.08),rgba(10,22,40,.9));
  box-shadow:0 10px 20px rgba(0,0,0,.3),0 0 14px rgba(212,175,55,.16);
}
.pred-card:active{transform:translateY(-1px) scale(1.005)}
.pred-card.state-locked:hover,
.pred-card.state-finished:hover{
  opacity:1;
  border-color:rgba(212,175,55,.5);
  background:linear-gradient(180deg,rgba(212,175,55,.08),rgba(10,22,40,.9));
  box-shadow:0 10px 20px rgba(0,0,0,.3),0 0 14px rgba(212,175,55,.16);
}

.pred-status-bar{
  padding:6px 14px;font-family:var(--f-mono);font-size:10px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  display:flex;align-items:center;justify-content:space-between;
}
.psb-open{background:rgba(34,214,106,.07);color:var(--green)}
.psb-warn{background:rgba(255,107,0,.09);color:var(--or)}
.psb-warn .psb-txt{animation:pg .9s ease-in-out infinite}
.psb-locked{background:rgba(255,255,255,.02);color:var(--tm)}
.psb-finished{background:rgba(255,255,255,.02);color:var(--tm)}

.pred-body{padding:13px 15px}
.pred-teams-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pred-team{flex:1;display:flex;align-items:center;gap:8px}
.pred-team.right{flex-direction:row-reverse;text-align:right}
.pred-flag{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.pred-name{font-size:13px;font-weight:600;line-height:1.25;font-family:var(--f-ui)}
.pred-seed-tag{font-family:var(--f-mono);font-size:8px;color:var(--or);font-weight:700;margin-top:1px;letter-spacing:.06em}
.pred-sep{font-family:var(--f-mono);font-size:12px;color:var(--tm);letter-spacing:.1em;flex-shrink:0;font-weight:700}

/* ── Waving flags (unchanged) ── */
.wf{--fw:24px;--fh:16px;--flag-url:none;position:relative;display:inline-block;width:var(--fw);height:var(--fh);border-radius:1px;overflow:hidden;background:#0d1f3c;box-shadow:0 1px 5px rgba(0,0,0,.5);transform-origin:left center;animation:wf-wave 1.7s ease-in-out infinite;will-change:transform}
.wf::before{content:'';position:absolute;inset:0;background-image:var(--flag-url);background-size:cover;background-position:center;animation:wf-shift 1.7s ease-in-out infinite}
.wf::after{content:'';position:absolute;inset:0;background:linear-gradient(110deg,rgba(255,255,255,.22) 0%,rgba(255,255,255,0) 35%,rgba(0,0,0,.18) 70%,rgba(0,0,0,.28) 100%);mix-blend-mode:soft-light;opacity:.9;animation:wf-gloss 1.7s ease-in-out infinite}
.wf-sm{--fw:18px;--fh:12px}.wf-md{--fw:24px;--fh:16px}.wf-lg{--fw:30px;--fh:20px}
@keyframes wf-wave{0%,100%{transform:perspective(140px) rotateY(0deg) skewY(0deg)}25%{transform:perspective(140px) rotateY(9deg) skewY(.6deg)}50%{transform:perspective(140px) rotateY(-6deg) skewY(-.5deg)}75%{transform:perspective(140px) rotateY(7deg) skewY(.4deg)}}
@keyframes wf-shift{0%,100%{transform:translateX(0)}50%{transform:translateX(-1px)}}
@keyframes wf-gloss{0%,100%{opacity:.75;transform:translateX(-4%)}50%{opacity:1;transform:translateX(4%)}}

.pred-input-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.score-colon{font-family:var(--f-mono);font-size:30px;font-weight:700;color:var(--tm);line-height:1;user-select:none}
.pred-saved-score{font-family:var(--f-mono);font-size:36px;font-weight:700;letter-spacing:.06em;color:var(--or);display:flex;align-items:center;gap:8px;text-shadow:0 0 20px rgba(255,107,0,.3)}
.pred-saved-sep{font-size:24px;color:rgba(255,107,0,.35)}
.pred-result{font-family:var(--f-mono);font-size:36px;font-weight:700;letter-spacing:.06em;color:var(--green);display:flex;align-items:center;gap:8px;text-shadow:0 0 20px rgba(34,214,106,.25)}
.pred-result-sep{font-size:24px;color:rgba(34,214,106,.35)}

.pred-footer{display:flex;align-items:center;justify-content:space-between;gap:10px}
.pred-meta{font-family:var(--f-mono);font-size:10px;color:var(--tm);line-height:1.6}
.pred-pts{font-family:var(--f-mono);font-size:22px;font-weight:700;letter-spacing:.04em}
.pts-pos{color:var(--green);text-shadow:0 0 12px rgba(34,214,106,.3)}
.pts-neg{color:var(--red)}
.pts-0{color:var(--tm)}

/* ── Lock bar ── */
.lock-bar{height:2px;background:rgba(30,45,69,.6);border-radius:1px;margin:0 14px 10px;overflow:hidden}
.lock-fill{height:100%;border-radius:1px;transition:width .5s ease;box-shadow:0 0 8px var(--or)}

/* ─────────────────────────── CHAMPION CARD ─────────────────────────── */
.champ-card{
  background:rgba(10,22,40,.9);
  border:1px solid rgba(255,107,0,.25);
  border-radius:2px;padding:18px 20px;margin-bottom:22px;
  position:relative;overflow:hidden;
}
.champ-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--or),var(--orl) 50%,transparent);opacity:.7}
.champ-title{
  font-family:var(--f-display);font-size:15px;letter-spacing:.2em;
  color:var(--or);margin-bottom:4px;display:flex;align-items:center;gap:8px;
  text-shadow:0 0 16px rgba(255,107,0,.2);
}
.champ-sub{font-family:var(--f-mono);font-size:10px;color:var(--ts);margin-bottom:12px;letter-spacing:.04em}
.champ-search{
  width:100%;background:rgba(13,31,60,.7);
  border:1px solid var(--br);border-radius:2px;
  padding:9px 12px;color:var(--tp);
  font-family:var(--f-mono);font-size:12px;letter-spacing:.04em;
  outline:none;margin-bottom:10px;transition:border-color .2s;
}
.champ-search:focus{border-color:var(--or);box-shadow:0 0 0 2px rgba(255,107,0,.1)}
.champ-search::placeholder{color:var(--tm)}
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px;max-height:155px;overflow-y:auto}
.champ-grid::-webkit-scrollbar{width:3px}.champ-grid::-webkit-scrollbar-thumb{background:var(--br-bright)}
.champ-team-btn{
  display:flex;align-items:center;gap:6px;padding:7px 9px;
  background:rgba(13,31,60,.5);border:1px solid var(--br);border-radius:2px;
  cursor:pointer;font-family:var(--f-mono);font-size:11px;font-weight:500;
  color:var(--ts);transition:all .18s;text-align:left;
}
.champ-team-btn:hover{
  background:rgba(255,107,0,.08);border-color:rgba(255,107,0,.3);
  color:var(--tp);box-shadow:0 0 10px rgba(255,107,0,.08);
  transform:translateY(-1px);
}
.champ-team-btn.selected{
  background:rgba(255,107,0,.12);border-color:rgba(255,107,0,.45);
  color:var(--or);box-shadow:0 0 12px rgba(255,107,0,.1);
}
.champ-selected{
  display:flex;align-items:center;gap:12px;padding:11px 14px;
  background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.28);
  border-radius:2px;margin-top:10px;
}
.champ-sel-flag{font-size:26px}
.champ-sel-name{font-family:var(--f-display);font-size:18px;letter-spacing:.1em;color:var(--or);text-shadow:0 0 14px rgba(255,107,0,.2)}
.champ-sel-sub{font-family:var(--f-mono);font-size:10px;color:var(--ts);margin-top:1px}

/* ─────────────────────────── LEADERBOARD ─────────────────────────── */
.lb-wrap{background:rgba(10,22,40,.85);border:1px solid var(--br);border-radius:2px;overflow:hidden}
.lb-scroll-x{overflow-x:auto;overflow-y:hidden}
.lb-table{min-width:500px}
.lb-head,.lb-row{display:grid;grid-template-columns:34px minmax(130px,1fr) 58px 56px 56px 58px 52px;align-items:center;gap:10px}
.lb-head{
  padding:9px 12px;background:rgba(5,10,20,.6);
  border-bottom:1px solid var(--br);
  font-family:var(--f-mono);font-size:9px;letter-spacing:.18em;
  font-weight:700;color:var(--tm);text-transform:uppercase;
}
.lb-row{
  padding:9px 12px;border-bottom:1px solid rgba(30,45,69,.5);
  transition:background .18s;
}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(255,107,0,.04)}
.lb-row.top1{background:linear-gradient(90deg,rgba(255,107,0,.1),rgba(255,107,0,.02))}
.lb-row.top2{background:linear-gradient(90deg,rgba(192,192,192,.08),rgba(192,192,192,.01))}
.lb-row.top3{background:linear-gradient(90deg,rgba(205,127,50,.08),rgba(205,127,50,.01))}
.lb-rank{font-family:var(--f-mono);font-size:18px;font-weight:700;text-align:center;color:var(--tm)}
.lb-rank.top1{color:var(--or);text-shadow:0 0 10px rgba(255,107,0,.3)}
.lb-rank.top2{color:#C0C0C0}.lb-rank.top3{color:#CD7F32}
.lb-user-name{font-weight:700;font-size:13px;line-height:1.2;font-family:var(--f-ui)}
.lb-user-tag{font-family:var(--f-mono);font-size:9px;color:var(--tm);margin-top:2px}
.lb-col-c{text-align:center}
.lb-num{font-family:var(--f-mono);font-size:18px;font-weight:700;letter-spacing:.03em;text-align:center}
.lb-p{color:var(--or)}.lb-st{color:var(--green)}.lb-tt{color:var(--blue)}.lb-a{color:var(--cyan)}.lb-cp{color:var(--purple)}

/* ─────────────────────────── HISTORY TABLE ─────────────────────────── */
.hist-row{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  border-radius:2px;background:rgba(10,22,40,.7);
  border:1px solid var(--br);margin-bottom:5px;
  transition:border-color .22s,transform .22s cubic-bezier(.22,1,.36,1),box-shadow .22s,background .22s;
  will-change:transform;
}
.hist-row:hover{
  transform:translateY(-2px) scale(1.01);
  border-color:rgba(212,175,55,.5);
  background:linear-gradient(180deg,rgba(212,175,55,.08),rgba(10,22,40,.88));
  box-shadow:0 10px 20px rgba(0,0,0,.3),0 0 14px rgba(212,175,55,.16);
}
.hist-row:active{transform:translateY(-1px) scale(1.005)}
.hist-match{flex:1}
.hist-teams{font-size:12px;font-weight:600;font-family:var(--f-ui)}
.hist-date{font-family:var(--f-mono);font-size:9px;color:var(--tm);margin-top:1px;letter-spacing:.04em}
.hist-pred{font-family:var(--f-mono);font-size:17px;font-weight:700;color:var(--ts)}
.hist-result{font-family:var(--f-mono);font-size:17px;font-weight:700;color:var(--tp)}
.hist-pts{font-family:var(--f-mono);font-size:18px;font-weight:700;min-width:40px;text-align:right}

/* ─────────────────────────── TOAST ─────────────────────────── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;pointer-events:none}
.toast{
  background:rgba(10,22,40,.97);border:1px solid var(--br);
  border-left:3px solid var(--or);border-radius:2px;
  padding:11px 16px;font-family:var(--f-ui);font-size:13px;color:var(--tp);
  box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 20px rgba(255,107,0,.05);
  animation:toast-in .28s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:10px;margin-top:8px;
}
.toast.success{border-left-color:var(--green);box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 16px rgba(34,214,106,.08)}
.toast.error{border-left-color:var(--red)}
@keyframes toast-in{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ─────────────────────────── SCROLL ─────────────────────────── */
.scroll{overflow-y:auto;padding-right:4px}
.scroll::-webkit-scrollbar{width:3px}.scroll::-webkit-scrollbar-thumb{background:var(--br-bright)}

/* ─────────────────────────── RULES ─────────────────────────── */
.rule-card{
  background:rgba(10,22,40,.8);border:1px solid var(--br);
  border-radius:2px;padding:11px 14px;
  display:flex;align-items:flex-start;gap:12px;margin-bottom:6px;
  transition:border-color .18s,background .18s;
}
.rule-card:hover{border-color:rgba(255,107,0,.2);background:rgba(255,107,0,.03)}
.rule-title{font-weight:700;font-size:13px;color:var(--tp);margin-bottom:2px;font-family:var(--f-ui)}
.rule-desc{font-size:11px;color:var(--ts);line-height:1.45;font-family:var(--f-ui)}
.rule-pts{
  margin-left:auto;flex-shrink:0;
  font-family:var(--f-mono);font-size:16px;font-weight:700;padding-left:10px;
}
.pts-g{color:var(--green)}.pts-r{color:var(--red)}.pts-gold{color:var(--or)}

/* ─────────────────────────── DATE SEP ─────────────────────────── */
.dt-sep{
  font-family:var(--f-mono);font-size:10px;letter-spacing:.2em;
  color:var(--tm);padding:8px 0 5px;text-transform:uppercase;
}
.dt-sep::before{content:'> ';color:var(--or);opacity:.5}

/* ─────────────────────────── RESPONSIVE: TABLET ─────────────────────────── */
@media(max-width:900px){
  .sidebar{width:60px}
  .sb-logo,.user-badge,.user-disp,.user-un,.nav-item>span:last-child,.sb-section-label{display:none}
  .sb-nav{padding:8px 4px}.nav-item{justify-content:center;padding:12px}
  .nav-item::before{top:0;bottom:0;left:auto;right:0;width:2px;height:auto}
  .app-main{margin-left:60px;padding:18px 14px}
  .g4{grid-template-columns:1fr 1fr}
  .champ-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .lb-table{min-width:560px}
  [data-layout="home-3col"]{grid-template-columns:1fr 1fr !important}
  [data-layout="home-3col"] [data-col="right"]{grid-column:span 2}
}

/* ─────────────────────────── RESPONSIVE: MOBILE ─────────────────────────── */
@media(max-width:600px){
  body{background-size:20px 20px}
  .sidebar{
    width:100%;height:54px;bottom:0;top:auto;flex-direction:row;
    border-right:none;border-top:1px solid var(--br);z-index:30;
  }
  .sidebar::before{height:0}
  .sb-logo{display:none}
  .sb-nav{
    flex:1;display:flex;flex-direction:row;padding:0;
    overflow-x:auto;overflow-y:hidden;gap:0;
  }
  .nav-item{
    flex:1;flex-direction:column;gap:2px;padding:5px 4px;
    border-radius:0;margin:0;min-width:58px;border:none;
    justify-content:center;align-items:center;text-align:center;
  }
  .nav-item::before{display:none}
  .nav-item.active{background:rgba(255,107,0,.1);border-radius:0;border-top:2px solid var(--or)}
  .nav-item>span:last-child{display:block;font-family:var(--f-mono);font-size:8px;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56px}
  .nav-icon{font-size:18px}
  .sb-user{display:none}
  .app-main{margin-left:0;padding:14px 12px 66px;min-height:100vh}
  .auth-card,.auth-card--w{padding:22px 16px 20px;max-width:100%;clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,0 100%)}
  .auth-card::after,.auth-card--w::after{border-width:0 16px 16px 0}
  .auth-wrap{padding:12px;align-items:flex-start;padding-top:16px}
  .g2{grid-template-columns:1fr}
  .g4{grid-template-columns:1fr 1fr}
  [data-match-grid]{grid-template-columns:1fr !important}
  [data-layout="home-3col"]{grid-template-columns:1fr !important}
  [data-layout="home-3col"] [data-col="right"]{grid-column:1}
  [data-layout="hero-row"]{grid-template-columns:1fr !important}
  [data-rules-grid]{grid-template-columns:1fr !important}
  .pg-title{font-size:22px}
  .hc-time{font-size:28px}
  .tabs{overflow-x:auto;flex-wrap:nowrap}
  .tab{flex:0 0 auto;padding:6px 11px}
  .score-box{width:50px;height:50px;font-size:24px}
  .pred-body{padding:10px 12px}
  .champ-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
  .stat{padding:11px 13px}
  .stat-val{font-size:22px}
  .lb-wrap{overflow-x:auto}
  .lb-table{min-width:480px}
  .logo-year{font-size:34px}
  .logo-ball{font-size:28px}
}

/* FM PREMIUM DASHBOARD OVERRIDES */
.app-root.fm-shell{
  --bg0:#070d18;
  --bg1:#050a14;
  --bg2:#1a2a4a;
  --bg3:#111d35;
  --or:#d4af37;
  --orl:#e3c35d;
  --ord:rgba(212,175,55,.14);
  --or-glow:rgba(212,175,55,.25);
  --gold:#d4af37;
  --br:#1e293b;
  --br-bright:#2f415e;
  --tp:#cbd5e1;
  --ts:#8ca1bd;
  --tm:#5b7090;
  --green:#22c55e;
  --red:#ef4444;
  --f-head:'General Sans','Outfit',sans-serif;
  --f-ui:'Satoshi','Inter',sans-serif;
  --f-mono:'JetBrains Mono',monospace;
  background:var(--bg0);
  color:var(--tp);
}
.app-root.fm-shell::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.04;
  background-image:
    radial-gradient(circle at 20% 20%,rgba(212,175,55,.35),transparent 30%),
    repeating-linear-gradient(0deg,rgba(255,255,255,.55) 0 1px,transparent 1px 20px),
    repeating-linear-gradient(90deg,rgba(255,255,255,.55) 0 1px,transparent 1px 20px);
}
.app-root.fm-shell .sidebar{
  width:190px;
  background:#050a14;
  border-right:1px solid var(--br);
}
.app-root.fm-shell .sidebar::before{display:none}
.app-root.fm-shell .sb-logo{
  padding:14px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid var(--br);
}
.app-root.fm-shell .fm-logo-box{
  width:28px;
  height:28px;
  border-radius:2px;
  background:#050a14;
  border:1px solid var(--br);
  overflow:hidden;
  display:grid;
  place-items:center;
}
.app-root.fm-shell .fm-logo-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.app-root.fm-shell .fm-logo-meta{line-height:1}
.app-root.fm-shell .fm-logo-title{
  font-family:var(--f-head);
  font-weight:800;
  font-size:11px;
  letter-spacing:.09em;
}
.app-root.fm-shell .fm-logo-sub{
  margin-top:3px;
  color:var(--tm);
  font-family:var(--f-mono);
  font-size:9px;
  letter-spacing:.1em;
}
.app-root.fm-shell .sb-nav{padding:10px 6px}
.app-root.fm-shell .nav-item{
  border-radius:2px;
  border:1px solid transparent;
  padding:10px 10px;
  gap:8px;
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
  font-weight:700;
}
.app-root.fm-shell .nav-item:hover{border-color:var(--br);background:rgba(26,42,74,.35)}
.app-root.fm-shell .nav-item.active{
  background:var(--bg2);
  color:var(--or);
  border-color:#2d4064;
}
.app-root.fm-shell .nav-item::before{
  width:3px;
  top:0;
  bottom:0;
  border-radius:0;
  transform:scaleY(0);
}
.app-root.fm-shell .nav-item.active::before{transform:scaleY(1)}
.app-root.fm-shell .nav-icon{
  width:24px;
  height:18px;
  border:1px solid var(--br);
  border-radius:2px;
  display:grid;
  place-items:center;
  font-size:9px;
  font-family:var(--f-mono);
  font-weight:700;
}
.app-root.fm-shell .sb-user{
  border-top:1px solid var(--br);
  padding:10px 8px 12px;
}
.app-root.fm-shell .user-badge{
  background:linear-gradient(180deg,rgba(26,42,74,.45),rgba(11,20,38,.55));
  border:1px solid var(--br);
}
.app-root.fm-shell .user-disp{
  font-family:var(--f-head);
  font-size:12px;
  letter-spacing:.05em;
  color:var(--tp);
}
.app-root.fm-shell .user-un{font-size:9px}
.app-root.fm-shell .btn-d{
  font-size:10px;
  letter-spacing:.14em;
  text-transform:uppercase;
  border-radius:2px;
}
.app-root.fm-shell .main-shell{
  margin-left:190px;
  min-height:100vh;
  width:calc(100% - 190px);
  position:relative;
  z-index:1;
}
.app-root.fm-shell .ctrl-header{
  height:48px;
  background:#050a14;
  border-bottom:1px solid var(--br);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  gap:10px;
}
.app-root.fm-shell .ctrl-left,.app-root.fm-shell .ctrl-right{display:flex;align-items:center;gap:8px}
.app-root.fm-shell .ctrl-icon-btn{
  width:22px;
  height:22px;
  border:1px solid var(--br);
  border-radius:2px;
  background:#0b162a;
  color:var(--ts);
  cursor:pointer;
}
.app-root.fm-shell .ctrl-icon-btn:hover{color:var(--or);border-color:var(--or)}
.app-root.fm-shell .ctrl-breadcrumb{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:10px;
  letter-spacing:.08em;
  text-transform:uppercase;
  font-family:var(--f-mono);
  color:var(--tm);
}
.app-root.fm-shell .ctrl-breadcrumb strong{color:var(--or)}
.app-root.fm-shell .ctrl-search-wrap{width:220px}
.app-root.fm-shell .ctrl-search{
  width:100%;
  height:30px;
  background:#111d35;
  border:1px solid var(--br);
  border-radius:2px;
  padding:0 10px;
  color:var(--tp);
  font-size:11px;
}
.app-root.fm-shell .sync-pill{
  height:30px;
  border:1px solid var(--br);
  border-radius:2px;
  padding:0 8px;
  display:flex;
  align-items:center;
  gap:6px;
  font-family:var(--f-mono);
  font-size:9px;
  letter-spacing:.08em;
  color:var(--tm);
}
.app-root.fm-shell .sync-pill.ok{color:#3ee381}
.app-root.fm-shell .sync-dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#3ee381;
  box-shadow:0 0 8px rgba(62,227,129,.7);
  animation:dotPulse 1.6s ease-in-out infinite;
}
.app-root.fm-shell .continue-btn{
  height:30px;
  padding:0 12px;
  border:1px solid var(--or);
  border-radius:2px;
  background:var(--or);
  color:#050a14;
  font-family:var(--f-head);
  font-size:11px;
  font-weight:900;
  letter-spacing:.08em;
  cursor:pointer;
  transition:all .25s cubic-bezier(.22,1,.36,1);
}
.app-root.fm-shell .continue-btn .date-short{display:none}
.app-root.fm-shell .continue-btn:hover{transform:translateY(-1px);filter:brightness(1.08)}
.app-root.fm-shell,
.app-root.fm-shell .main-shell,
.app-root.fm-shell .app-main{
  overflow-x:hidden;
}
.app-root.fm-shell .app-main{
  margin-left:0;
  padding:14px;
  padding-bottom:40px;
  min-height:calc(100vh - 72px);
}
.app-root.fm-shell .sys-footer{
  position:fixed;
  left:190px;
  right:0;
  bottom:0;
  height:24px;
  background:var(--or);
  color:#050a14;
  border-top:1px solid #a18120;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 10px 0 12px;
  font-family:var(--f-mono);
  font-size:9px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  z-index:40;
  overflow:hidden;
}
.app-root.fm-shell .sys-ticker-wrap{
  flex:1;
  min-width:0;
  height:100%;
  display:flex;
  align-items:center;
  overflow:hidden;
  position:relative;
  padding-right:12px;
}
.app-root.fm-shell .sys-ticker-wrap::after{
  content:'';
  position:absolute;
  top:0;
  right:0;
  width:24px;
  height:100%;
  background:linear-gradient(90deg,rgba(212,175,55,0),rgba(212,175,55,1));
  pointer-events:none;
}
.app-root.fm-shell .sys-ticker-track{
  display:flex;
  align-items:center;
  gap:58px;
  white-space:nowrap;
  min-width:max-content;
  animation:sysTicker 18s linear infinite;
}
.app-root.fm-shell .sys-time-box{
  flex-shrink:0;
  height:18px;
  display:flex;
  align-items:center;
  border:1px solid rgba(5,10,20,.78);
  border-radius:2px;
  background:rgba(5,10,20,.72);
  padding:0 8px;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
}
.app-root.fm-shell .sys-time{
  margin-left:0;
  color:#f87171;
}

.home-fm .context-banner{

.home-fm .fm-panel{

const TR3=3*60;
const toTR=u=>new Date(new Date(u).getTime()+TR3*60000);
const fmtTR=u=>{const d=toTR(u);return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0')};
const fmtDateFull=u=>{const d=toTR(u);const days=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];const months=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Austos','Eylül','Ekim','Kasım','Aralık'];return days[d.getUTCDay()]+' '+d.getUTCDate()+' '+months[d.getUTCMonth()]};

const sameDay=(u,now)=>{const tr=toTR(u);const nt=new Date(now.getTime()+TR3*60000);return tr.getUTCFullYear()===nt.getUTCFullYear()&&tr.getUTCMonth()===nt.getUTCMonth()&&tr.getUTCDate()===nt.getUTCDate()};
const getMatchStatus=(m,now,scores)=>{
  const sc=scores[m.id];
  if(sc&&typeof sc.h==='number'&&typeof sc.a==='number'){
    if(sc.status==='live') return 'live';
    if(sc.status==='finished'||sc.status==='ft') return 'finished';
    return 'finished';
  }
  const s=new Date(m.utc).getTime();
  if(now.getTime()<s) return 'upcoming';
  if(now.getTime()<s+100*60000) return 'live';
  return 'upcoming';
};
const cdText=(u,now)=>{
  const diff=new Date(u).getTime()-now.getTime();
  if(diff<=0) return null;
  const tm=Math.floor(diff/60000);
  const d=Math.floor(tm/1440),h=Math.floor((tm%1440)/60),m=tm%60;
  if(d>0) return`${d}g ${h}s ${m}dk`;
  if(h>0) return`${h}s ${m}dk`;
  return`${m}dk`;
};
const getLockState=(m,now)=>{
  const start=new Date(m.utc).getTime();
  const ms=now.getTime();
  if(ms>=start) return 'started';
  if(ms>=start-60*60000) return 'locked';   // < 60 dk  kilitli
  if(ms>=start-2*60*60000) return 'warn';   // < 2 saat  uyarı
  return 'open';
};
const getLockPct=(m,now)=>{
  const start=new Date(m.utc).getTime();
  const lockAt=start-60*60000;
  const warnAt=start-2*60*60000;
  const ms=now.getTime();
  if(ms>=lockAt) return 100;
  if(ms<warnAt) return 0;
  return Math.min(100,((ms-warnAt)/(lockAt-warnAt))*100);
};

const outcome=(h,a)=>h===a?'D':h>a?'H':'A';
const winnerTeam=(m,sc)=>sc.h===sc.a?null:(sc.h>sc.a?m.h:m.a);
const ruleScorePoints=(pred,sc)=>{
  if(pred.h!==sc.h||pred.a!==sc.a) return 0;
  if(sc.h===0&&sc.a===0) return 4;
  if((sc.h===1&&sc.a===0)||(sc.h===0&&sc.a===1)) return 2;
  if((sc.h===2&&sc.a===0)||(sc.h===0&&sc.a===2)) return 3;
  if((sc.h===2&&sc.a===1)||(sc.h===1&&sc.a===2)) return 3;
  if(sc.h===2&&sc.a===2) return 4;
  if((sc.h===3&&sc.a===0)||(sc.h===0&&sc.a===3)) return 3; // Rules page mapping
  if(Math.abs(sc.h-sc.a)>=3&&(sc.h+sc.a)>=4) return 5;      // 3+ fark (except 3-0/0-3)
  return 0;
};
const ruleOutcomePoints=(m,pred,sc)=>{
  if(outcome(pred.h,pred.a)!==outcome(sc.h,sc.a)) return 0;
  if(sc.h===sc.a) return 2;
  const winner=winnerTeam(m,sc);
  const loser=winner===m.h?m.a:m.h;
  const winnerSeeded=SEEDED.includes(winner);
  const loserSeeded=SEEDED.includes(loser);
  if(!winnerSeeded&&loserSeeded) return 3;
  if(winnerSeeded) return 1;
  return 1; // other vs other winner
};
const ruleMatchPoints=(m,pred,sc)=>ruleScorePoints(pred,sc)+ruleOutcomePoints(m,pred,sc);
const isLiveScore=sc=>sc&&sc.status==='live';
const computeLeaderboard=(users,scores)=>{
  const rows=Object.values(users).map(u=>{
    const preds=S.get('preds_'+u.username)||{};
    let confirmed=0,potentialLive=0,st=0,tt=0,playedFinal=0;
    MATCHES.forEach(m=>{
      const pred=preds[m.id];
      const sc=scores[m.id];
      if(!pred||!sc||typeof sc.h!=='number'||typeof sc.a!=='number') return;
      const p=ruleMatchPoints(m,pred,sc);
      if(isLiveScore(sc)){
        potentialLive+=p;
      }else{
        confirmed+=p;
        playedFinal++;
        if(pred.h===sc.h&&pred.a===sc.a) st++;
        if(outcome(pred.h,pred.a)===outcome(sc.h,sc.a)) tt++;
      }
    });
    const totalPoints=confirmed+potentialLive;
    const avg=playedFinal?confirmed/playedFinal:0;
    return{...u,totalPoints,confirmedPts:confirmed,potentialPts:potentialLive,st,tt,avg,played:playedFinal};
  });
  return rows.sort((a,b)=>(b.totalPoints-a.totalPoints||b.avg-a.avg||b.st-a.st||b.tt-a.tt||a.displayName.localeCompare(b.displayName,'tr')));
};

/*  USER PROFILE SCORE (cumulative, multi-tournament; not leaderboard)  */
const USER_SCORE_TOURNAMENT_ID='wc2026';
const USER_SCORE_ENGINE_VERSION=2;
const USER_SCORE_WEIGHTS={ exactScore:25, correctWinner:15, savedPenalty:10, hattrick:10, redCard:-10, missedPenalty:-10 };

function makeUserScoreLedgerKey(tournamentId,matchId){ return `${tournamentId}::${matchId}`; }

function migrateUserScoreFields(){
  const users=S.get('users')||{};
  let changed=false;
  for(const k of Object.keys(users)){
    const u=users[k];
    if(u.userScoreEngineVersion!==USER_SCORE_ENGINE_VERSION){
      u.userScore=0;
      u.userScoreLedger={};
      u.userScoreEngineVersion=USER_SCORE_ENGINE_VERSION;
      users[k]=u;
      changed=true;
      continue;
    }
    if(u.userScore==null){ u.userScore=0; users[k]=u; changed=true; }
    if(!u.userScoreLedger){ u.userScoreLedger={}; users[k]=u; changed=true; }
  }
  if(changed) S.set('users',users);
}

function isFinalScoreForUserProfile(sc){
  if(!sc||typeof sc.h!=='number'||typeof sc.a!=='number') return false;
  if(sc.status==='live') return false;
  return true;
}

function sumBreakdown(b){
  let s=0;
  for(const v of Object.values(b)){
    if(typeof v==='number'&&Number.isFinite(v)) s+=v;
  }
  return Math.round(s*100)/100;
}

/**
 * Pure scoring: matchEvents = actual facts + final score; userPrediction = { h, a }.
 * Penalty shootout: set penaltyShootout:true to exclude RT/ET penalty rows from saved/missed rules.
 */
function calculateUserScore(matchEvents,userPrediction){
  const breakdown={};
  if(!matchEvents||!matchEvents.finalScore) return{ delta:0, breakdown, reason:'no_final_score' };
  const actual=matchEvents.finalScore;
  const ah=Number(actual.h),aa=Number(actual.a);
  if(!Number.isFinite(ah)||!Number.isFinite(aa)) return{ delta:0, breakdown, reason:'bad_final' };

  const pred=userPrediction;
  if(!pred||typeof pred.h!=='number'||typeof pred.a!=='number') return{ delta:0, breakdown, reason:'no_prediction' };

  const ph=Number(pred.h),pa=Number(pred.a);
  if(!Number.isFinite(ph)||!Number.isFinite(pa)) return{ delta:0, breakdown, reason:'bad_pred' };

  const exact=ph===ah&&pa===aa;
  const oP=outcome(ph,pa);
  const oA=outcome(ah,aa);
  if(exact) breakdown.exactScore=USER_SCORE_WEIGHTS.exactScore;
  else if(oP===oA) breakdown.correctWinner=USER_SCORE_WEIGHTS.correctWinner;

  const ev=matchEvents;
  const shootout=ev.penaltyShootout===true;
  if(!shootout){
    const sp=Math.max(0,Math.min(20,Number(ev.savedPenalties)||0));
    if(sp>=1) breakdown.savedPenalty=USER_SCORE_WEIGHTS.savedPenalty;
    const mp=Math.max(0,Math.min(20,Number(ev.missedPenalties)||0));
    if(mp>0) breakdown.missedPenalty=USER_SCORE_WEIGHTS.missedPenalty*mp;
  }

  if(ev.hattrick===true) breakdown.hattrick=USER_SCORE_WEIGHTS.hattrick;

  const rc=Math.max(0,Math.min(20,Number(ev.redCards)||0));
  if(rc>0) breakdown.redCard=USER_SCORE_WEIGHTS.redCard*rc;

  const delta=sumBreakdown(breakdown);
  return{ delta, breakdown };
}

function buildMatchEventsSnapshot(sc,tourEv){
  const fe={ h:sc.h, a:sc.a };
  const base=tourEv&&typeof tourEv==='object'?tourEv:{};
  return{
    finalScore:fe,
    redCards:Math.max(0,Math.min(20,Number(base.redCards)||0)),
    missedPenalties:Math.max(0,Math.min(20,Number(base.missedPenalties)||0)),
    savedPenalties:Math.max(0,Math.min(20,Number(base.savedPenalties)||0)),
    hattrick:base.hattrick===true,
    penaltyShootout:base.penaltyShootout===true
  };
}

function buildUserScoreFingerprint(tournamentId,matchId,snapshot,pred){
  const predKey=pred&&typeof pred.h==='number'&&typeof pred.a==='number'?`${pred.h}:${pred.a}`:'none';
  return JSON.stringify({
    v:USER_SCORE_ENGINE_VERSION,
    tournamentId,
    matchId,
    score:[snapshot.finalScore.h,snapshot.finalScore.a],
    ev:{
      rc:snapshot.redCards,
      mp:snapshot.missedPenalties,
      sp:snapshot.savedPenalties,
      hat:snapshot.hattrick,
      ps:snapshot.penaltyShootout
    },
    predKey
  });
}

/**
 * Idempotent: one ledger row per (tournament, match, prediction snapshot).
 * If result or prediction changes, previous delta is reversed and new delta applied.
 */
function processUserProfileScores(scores,tournamentId){
  migrateUserScoreFields();
  const eventsRoot=S.get('matchEvents')||{};
  const tourEvents=eventsRoot[tournamentId]||{};
  let users=S.get('users')||{};
  let dirty=false;

  for(const m of MATCHES){
    const sc=scores[m.id];
    if(!isFinalScoreForUserProfile(sc)) continue;

    const snap=buildMatchEventsSnapshot(sc,tourEvents[m.id]);

    for(const username of Object.keys(users)){
      const preds=S.get('preds_'+username)||{};
      const pred=preds[m.id];
      const fp=buildUserScoreFingerprint(tournamentId,m.id,snap,pred);
      const key=makeUserScoreLedgerKey(tournamentId,m.id);
      const u={...users[username]};
      const ledger={...(u.userScoreLedger||{})};
      const prev=ledger[key];
      if(prev&&prev.fingerprint===fp) continue;

      const { delta, breakdown }=calculateUserScore({ ...snap, tournamentId, matchId:m.id }, pred);
      const prevDelta=prev?Number(prev.delta)||0:0;
      u.userScore=Math.round(((Number(u.userScore)||0)-prevDelta+delta)*100)/100;

      ledger[key]={
        delta,
        fingerprint:fp,
        appliedAt:new Date().toISOString(),
        tournamentId,
        matchId:m.id,
        breakdown,
        hadPrediction:!!pred
      };
      u.userScoreLedger=ledger;
      users[username]=u;
      dirty=true;
    }
  }

  if(dirty) S.set('users',users);
}

  const today=enriched.filter(m=>sameDay(m.utc,now));
  const live=enriched.filter(m=>m.status==='live');
  const upcoming=enriched.filter(m=>m.status==='upcoming');
  const finished=enriched.filter(m=>m.status==='finished');
  const nextM=enriched.find(m=>m.status==='upcoming');
  const preTournament=now<new Date('2026-06-11T19:00:00Z');
  const cdTarget=preTournament?new Date('2026-06-11T19:00:00Z'):nextM?new Date(nextM.utc):null;
  const cdVal=cdTarget?cdText(cdTarget.toISOString(),now):null;
  const lb=useMemo(()=>computeLeaderboard(users,scores),[users,scores,now]);

  const matchdayRows=useMemo(()=>{
    const activeDay=[...live,...today.filter(m=>m.status!=='live')];
    if(activeDay.length>0){
      const uniq=Object.values(activeDay.reduce((acc,m)=>{acc[m.id]=m;return acc;},{}));
      return uniq.sort((a,b)=>new Date(a.utc)-new Date(b.utc));
    }
    if(nextM){
      const nextKey=fmtDateKey(nextM.utc);
      return enriched.filter(m=>fmtDateKey(m.utc)===nextKey).sort((a,b)=>new Date(a.utc)-new Date(b.utc));
    }
    return [];
  },[live,today,nextM,enriched]);
  const rankingDayKey=matchdayRows[0]?fmtDateKey(matchdayRows[0].utc):null;
  const topDailyRanking=useMemo(()=>{
    if(!rankingDayKey) return [];
    const dayMatches=MATCHES.filter(m=>fmtDateKey(m.utc)===rankingDayKey);

        played++;
        const p=ruleMatchPoints(m,pred,sc);

        if(pred.h===sc.h&&pred.a===sc.a) exact++;
        if(outcome(pred.h,pred.a)===outcome(sc.h,sc.a)) correct++;
      });
      const form=played?Math.round((correct/played)*100):0;
      return{...u,dayPts,exact,correct,played,form};
    });
    return rows.sort((a,b)=>(b.dayPts-a.dayPts||b.exact-a.exact||b.correct-a.correct||a.displayName.localeCompare(b.displayName,'tr'))).slice(0,3);
  },[rankingDayKey,users,scores]);

        const n=Number(v);

      }
      return 0;

      hattrick:(ev.hattrick===true||sc.hattrick===true),

/*  Ana Sayfa Match Card  */
function MC({m,now,scores,myPreds,showCD=false,compact=false}){
  const sc=scores[m.id]||null;
  const myP=myPreds[m.id]||null;
  const isLocked=getLockState(m,now)==='locked'||getLockState(m,now)==='started';
  const cd=showCD&&m.status==='upcoming'?cdText(m.utc,now):null;
  const hS=SEEDED.includes(m.h);const aS=SEEDED.includes(m.a);
  const statusEl=()=>{
    if(m.status==='live')return<span className="tag tag-live"> CANLI</span>;
    if(m.status==='finished')return<span className="tag tag-done">BİTTİ</span>;
    if(isLocked)return<span className="tag tag-lock"></span>;
    if(cd&&parseInt(cd)<=90)return<span className="tag tag-soon">YAKINDA</span>;
    return null;
  };
  return<div className={`match-card${m.status==='live'?' live':m.status==='finished'?' finished':''}`}>
    <div className="mc-body" style={{padding:'10px'}}>
      <MatchScoreboard m={m} now={now} score={sc} status={m.status}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
        <div>{statusEl()}</div>
        {(hS||aS)&&<div style={{fontSize:9,color:'var(--or)',letterSpacing:'.06em'}}>SERİ BAŞI: {hS?m.h:''}{hS&&aS?' / ':''}{aS?m.a:''}</div>}
      </div>
      {/* Locked: show my prediction */}
      {isLocked&&myP&&<div style={{marginTop:8,padding:'5px 8px',background:'rgba(167,139,250,.08)',border:'1px solid rgba(167,139,250,.2)',borderRadius:8,textAlign:'center'}}>
        <span style={{fontSize:10,color:'var(--purple)',letterSpacing:'.1em',fontWeight:700}}>TAHMİNİNİZ: </span>
        <span style={{fontFamily:"'Bebas Neue'",fontSize:15,color:'var(--purple)',letterSpacing:'.08em'}}>{myP.h} - {myP.a}</span>
        {myP.pts!=null&&myP.pts!==0&&<span style={{marginLeft:6,fontFamily:"'Bebas Neue'",fontSize:14,color:myP.pts>0?'var(--green)':'var(--red)'}}>{myP.pts>0?'+':''}{myP.pts}</span>}
      </div>}
    </div>
    {!compact&&<div className="mc-bottom">
      {cd?<span className="mc-cd">⏱ {cd} kaldı</span>:<span className="mc-cd" style={{color:'var(--tm)',fontSize:10}}>{m.city}</span>}
    </div>}
  </div>;
}

function MyScreen({currentUser,onUserUpdate,scores}){
  const [now,setNow]=useState(new Date());
  const [tab,setTab]=useState('predict');
  const [preds,setPreds]=useState(()=>S.get('preds_'+currentUser.username)||{});
  const [champion,setChampion]=useState(()=>S.get('champ_'+currentUser.username)||null);
  const toast=useToast();

  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(id)},[]);
  const enriched=useMemo(()=>MATCHES.map(m=>({...m,status:getMatchStatus(m,now,scores),ls:getLockState(m,now),lockPct:getLockPct(m,now)})),[now,scores]);

  const savePred=(matchId,h,a)=>{
    const m=MATCHES.find(x=>x.id===matchId);
    if(!m) return;
    if(getLockState(m,now)==='locked'||getLockState(m,now)==='started'){toast('Bu maç kilitlendi, tahmin yapılamaz!','error');return;}
    const updated={...preds,[matchId]:{h:parseInt(h)||0,a:parseInt(a)||0,savedAt:new Date().toISOString(),pts:null}};
    setPreds(updated);
    S.set('preds_'+currentUser.username,updated);
    processUserProfileScores(S.get('scores')||{},USER_SCORE_TOURNAMENT_ID);
    onUserUpdate();
    toast(`Tahmin kaydedildi: ${h} - ${a} `,'success');
  };

  const saveChampion=(team)=>{
    setChampion(team);
    S.set('champ_'+currentUser.username,team);
    toast(`Şampiyon tahmini güncellendi: ${team} `,'success');
  };

  const totalPreds=Object.keys(preds).length;
  const finishedWithScore=Object.entries(preds).filter(([mid,p])=>scores[mid]&&p.pts!=null);
  const totalPts=currentUser.totalPoints||0;
  const correctPreds=finishedWithScore.filter(([,p])=>p.pts>0).length;

  const openMatches=enriched.filter(m=>m.ls==='open'||m.ls==='warn');
  const lockedFinished=enriched.filter(m=>m.ls==='locked'||m.ls==='started'||m.status==='finished');
  const nextM=enriched.find(m=>m.status==='upcoming');
  const cd=nextM?cdText(nextM.utc,now):null;
  const predictRate=MATCHES.length?Math.round((totalPreds/MATCHES.length)*100):0;
  const successRate=finishedWithScore.length?Math.round((correctPreds/finishedWithScore.length)*100):0;

  return<div className="my-fm">

        <div className="my-badge">MY</div>

          <div className="my-meta">
            <span>@{currentUser.username}</span>
            <span>•</span>
            <span>{totalPreds} tahmin</span>
            <span>•</span>
            <span>{successRate}% isabet</span>

        </div>
      </div>
      <div className="my-next-box">
        <div className="my-next-label">SONRAKİ MAÇ</div>
        {nextM?<>
          <div className="my-next-match">{nextM.h} vs {nextM.a}</div>
          <div className="my-next-time">{fmtDateFull(nextM.utc)} · {fmtTR(nextM.utc)} TR</div>
          <div className="my-next-cd">{cd||'Devam ediyor...'}</div>
        </>:<>
          <div className="my-next-match">Planlanmış maç yok</div>
          <div className="my-next-time">Takvim güncelleniyor</div>
        </>}
      </div>
    </section>

    <div className="my-stats-grid">
      <div className="my-stat"><span>PROFİL SKORU</span><strong>{Number(currentUser.userScore)||0}</strong><small>Tüm turnuvalar</small></div>
      <div className="my-stat"><span>TOPLAM PUAN</span><strong>{totalPts}</strong><small>Lig puanı</small></div>
      <div className="my-stat"><span>TAHMİN ORANI</span><strong>{predictRate}%</strong><small>{totalPreds}/{MATCHES.length}</small></div>
      <div className="my-stat"><span>İSABETLİ</span><strong>{correctPreds}</strong><small>Skorlanan maçlar</small></div>
    </div>

    <section className="my-workspace">
      <aside className="my-side">
        <ChampionCard champion={champion} onSave={saveChampion} now={now}/>

          <div className="panel-head">SİSTEM NOTU</div>
          <p>Tahminler maçtan 60 dakika önce otomatik kilitlenir. Kilit sonrası değişiklik yapılamaz.</p>

      <div className="my-main-panel">

          <button className={`my-tab${tab==='predict'?' active':''}`} onClick={()=>setTab('predict')}>
            Tahmin Yap <span>{openMatches.length}</span>

          <button className={`my-tab${tab==='locked'?' active':''}`} onClick={()=>setTab('locked')}>

function PredCard({m,pred,score,now,onSave}){
  const [hVal,setHVal]=useState(pred?String(pred.h):'');
  const [aVal,setAVal]=useState(pred?String(pred.a):'');
  const [dirty,setDirty]=useState(false);

  const ls=getLockState(m,now);
  const locked=ls==='locked'||ls==='started';
  const isLiveScoreboard=score&&score.status==='live';
  const isFinished=score!=null&&!isLiveScoreboard;

  // Auto-update inputs when pred changes from outside
  useEffect(()=>{if(pred&&!dirty){setHVal(String(pred.h));setAVal(String(pred.a))}},[]); // eslint-disable-line

  const stateClass=ls==='open'?'state-open':ls==='warn'?'state-warn':locked?'state-locked':'state-finished';
  const psbClass=ls==='open'?'psb-open':ls==='warn'?'psb-warn':'psb-locked';
  const lockPct=getLockPct(m,now);
  const hasStarted=now.getTime()>=new Date(m.utc).getTime();

  const cd=!locked?cdText(m.utc,now):null;
  const lockCd=ls==='warn'||ls==='open'?cdText(new Date(new Date(m.utc).getTime()-60*60000).toISOString(),now):null;

  const handleSave=()=>{
    if(hVal===''||aVal===''){return}
    onSave(m.id,parseInt(hVal)||0,parseInt(aVal)||0);
    setDirty(false);
  };

  const statusLabel=()=>{
    if(isFinished) return' MA TAMAMLANDI';
    if(locked) return pred?' KİLİTLENDİ  TAHMİNİNİZ KAYDEDİLDİ':' KİLİTLENDİ  TAHMİN GİRİLMEDİ';
    if(ls==='warn') return` KİLİTLENMEYE ${lockCd||'AZ'} KALDI`;
    return` TAHMİN AÇIK • Saat: ${fmtTR(m.utc)} TR`;
  };

  const hasSaved=pred!=null;

  return<div className={`pred-card ${stateClass}`}>
    {/* Status bar */}
    <div className={`pred-status-bar ${psbClass}`}>
      <span className="psb-txt">{isFinished?' TAMAMLANDI':locked?pred?' KİLİTLENDİ':'  TAHMİN GİRİLMEDİ':ls==='warn'?` KİLİTLENMEYE ${lockCd} KALDI`:` TAHMİN AÇIK`}</span>
      <span style={{fontSize:10,opacity:.75}}>{fmtTR(m.utc)} TR · GRP {m.grp}</span>
    </div>

    {/* Lock progress bar (only in warn state) */}
    {ls==='warn'&&<div className="lock-bar"><div className="lock-fill" style={{width:`${lockPct}%`,background:'var(--or)'}}/></div>}
    {ls==='open'&&<div className="lock-bar"><div className="lock-fill" style={{width:`${lockPct}%`,background:'var(--green)'}}/></div>}

    <div className="pred-body">
      {/* Shared scoreboard-style match header */}
      <div style={{marginBottom:12}}>
        <MatchScoreboard m={m} now={now} score={score} status={isFinished?'finished':isLiveScoreboard||hasStarted?'live':'upcoming'}/>
      </div>

      {/* Score input or locked display */}
      {!locked&&!isFinished&&!isLiveScoreboard&&<>
        <div className="pred-input-row">
          <input type="number" min="0" max="20" className={`score-box${hasSaved?' saved':''}`}
            value={hVal} onChange={e=>{setHVal(e.target.value);setDirty(true)}}
            onFocus={e=>e.target.select()}
            style={{fontSize:30}}/>
          <span className="score-colon">:</span>
          <input type="number" min="0" max="20" className={`score-box${hasSaved?' saved':''}`}
            value={aVal} onChange={e=>{setAVal(e.target.value);setDirty(true)}}
            onFocus={e=>e.target.select()}
            style={{fontSize:30}}/>
        </div>
        <div className="pred-footer">
          <div className="pred-meta">
            <div>{m.city}</div>
            {cd&&<div>⏱ {cd} kaldı</div>}
            {hasSaved&&!dirty&&<div style={{color:'var(--or)'}}> Kaydedildi</div>}
          </div>
          <button className="btn-sm" onClick={handleSave} disabled={hVal===''||aVal===''||(!dirty&&hasSaved)}>
            {hasSaved&&!dirty?'KAYDEDİLDİ ':'KAYDET'}
          </button>
        </div>
      </>}

      {/* Locked with prediction */}
      {locked&&pred&&<>
        <div style={{textAlign:'center',marginBottom:12}}>
          <div style={{fontSize:11,color:'var(--tm)',letterSpacing:'.12em',fontWeight:700,marginBottom:6}}>TAHMİNİNİZ</div>
          <div className="pred-saved-score">
            <span>{pred.h}</span><span className="pred-saved-sep">:</span><span>{pred.a}</span>
          </div>
        </div>
        {isFinished&&<>
          <div style={{textAlign:'center',marginBottom:12}}>
            <div style={{fontSize:11,color:'var(--tm)',letterSpacing:'.12em',fontWeight:700,marginBottom:6}}>GEREK SONU</div>
            <div className="pred-result"><span>{score.h}</span><span className="pred-result-sep">:</span><span>{score.a}</span></div>
          </div>
          {pred.pts!=null&&<div style={{textAlign:'center'}}>
            <div style={{fontSize:11,color:'var(--tm)',letterSpacing:'.12em',fontWeight:700,marginBottom:4}}>KAZANILAN PUAN</div>
            <div className={`pred-pts ${pred.pts>0?'pts-pos':pred.pts<0?'pts-neg':'pts-0'}`}>{pred.pts>0?'+':''}{pred.pts}</div>
          </div>}
        </>}
        {!isFinished&&<div style={{textAlign:'center',padding:'6px 0',fontSize:12,color:'var(--tm)'}}>Maç sonucu bekleniyor...</div>}
      </>}

      {/* Locked WITHOUT prediction */}
      {locked&&!pred&&<div style={{textAlign:'center',padding:'16px',background:'rgba(239,68,68,.04)',border:'1px solid rgba(239,68,68,.15)',borderRadius:10}}>
        <div style={{fontSize:26,marginBottom:6}}></div>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:15,letterSpacing:'.1em',color:'var(--red)',marginBottom:4}}>TAHMİN GİRİLMEDİ</div>
        <div style={{fontSize:12,color:'var(--tm)'}}>Bu maç için tahmin girme süreniz doldu.</div>
      </div>}

      {/* Not locked, no prediction yet, show hint */}
      {!locked&&!pred&&<div style={{textAlign:'center',fontSize:11,color:'var(--tm)',marginBottom:4}}>Skoru gir ve kaydet</div>}
    </div>
  </div>;
}

/*  Locked/Finished List  */
function PredLockedList({matches,preds,scores,now}){
  const byDate=useMemo(()=>{const m={};matches.forEach(x=>{const k=fmtDateKey(x.utc);(m[k]=m[k]||[]).push(x)});return m},[matches]);
  return<div>{Object.entries(byDate).sort(([a],[b])=>b.localeCompare(a)).map(([dk,ms])=>(
    <div key={dk}>
      <div className="dt-sep">{fmtDateFull(ms[0].utc)}</div>
      {ms.map(m=><PredCard key={m.id} m={m} pred={preds[m.id]||null} score={scores[m.id]||null} now={now} onSave={()=>{}}/>)}
    </div>
  ))}</div>;
}

/*  Prediction History  */
function PredHistory({preds,scores}){
  const rows=MATCHES.map(m=>({m,pred:preds[m.id]||null,score:scores[m.id]||null})).filter(r=>r.pred||r.score);
  if(rows.length===0) return<div style={{padding:'24px',textAlign:'center',color:'var(--ts)',fontSize:14}}>Henüz tahmin girilmemiş. "Tahmin Yap" sekmesinden başlayın!</div>;
  const totalPts=rows.reduce((s,r)=>s+(r.pred?.pts||0),0);
  return<div>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
      <div style={{fontFamily:"'Bebas Neue'",fontSize:16,letterSpacing:'.12em',color:'var(--ts)'}}>TOPLAM: {rows.length} TAHMİN</div>
      <div style={{marginLeft:'auto',fontFamily:"'Bebas Neue'",fontSize:22,color:totalPts>0?'var(--green)':totalPts<0?'var(--red)':'var(--tm)'}}>{totalPts>0?'+':''}{totalPts} PUAN</div>
    </div>
    <div className="scroll" style={{maxHeight:520}}>
      {rows.map(({m,pred,score})=>(
        <div key={m.id} className="hist-row">
          <div className="hist-match">
            <div className="hist-teams" style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}><WFlag team={m.h} size="sm"/><span>{m.h}</span><span>vs</span><WFlag team={m.a} size="sm"/><span>{m.a}</span></div>
            <div className="hist-date">{fmtDateFull(m.utc)} · {fmtTR(m.utc)} TR · Grup {m.grp}</div>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--tm)',marginBottom:2}}>TAHMİN</div>
            {pred?<div className="hist-pred">{pred.h} - {pred.a}</div>:<div style={{fontSize:11,color:'var(--red)'}}></div>}
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--tm)',marginBottom:2}}>SONU</div>
            {score?<div className="hist-result">{score.h} - {score.a}</div>:<div style={{fontSize:11,color:'var(--tm)'}}>?</div>}
          </div>
          <div className="hist-pts">
            {pred?.pts!=null?<span style={{color:pred.pts>0?'var(--green)':pred.pts<0?'var(--red)':'var(--tm)',fontFamily:"'Bebas Neue'",fontSize:20}}>{pred.pts>0?'+':''}{pred.pts}</span>:<span style={{color:'var(--tm)',fontSize:14}}></span>}
          </div>
        </div>
      ))}
    </div>
  </div>;
}

/*  RULES  */

    {icon:'⇄',t:'Diğer Takım Galibiyeti',d:'İki "diğer" takım arasındaki galibiyeti tahmin et',pts:'+1',c:'pts-g'},
    {icon:'▲',t:'Sürpriz Galibiyet',d:'Seri başı olmayan takım seri başına galip gelirse',pts:'+3',c:'pts-g'},
    {icon:'★',t:'Şampiyon Tahmini',d:'Turnuvayı kazanan takımı doğru tahmin et',pts:'+5',c:'pts-gold'},
    {icon:'■',t:'Kırmızı Kart',d:'Maçta kırmızı kart çıkarsa (penaltı serisi hariç)',pts:'-1',c:'pts-r'},
    {icon:'○',t:'Kaçan Penaltı',d:'Normal süre veya uzatmada penaltı kaçarsa',pts:'-1',c:'pts-r'},

  const scoreMap=[

    ['2-1 / 1-2','3 Puan'],
    ['3-0 / 0-3','3 Puan'],

  return<div className="rules-fm">
    <section className="rules-banner">
      <div className="rules-banner-left">
        <div className="rules-badge">RL</div>
        <div>
          <div className="rules-overline">COMPETITION PROTOCOL · SCORING SYSTEM</div>
          <h2>KURALLAR</h2>
          <div className="rules-sub">
            <span>Puanlama sistemi</span>
            <span>•</span>
            <span>Tahmin kilidi</span>
            <span>•</span>
            <span>Veri politikası</span>
          </div>
        </div>
      </div>
      <div className="rules-banner-right">
        <small>ANA KURAL</small>
        <strong>Tahminler maçtan 60 dakika önce kapanır</strong>
        <span>Kilit sonrası düzenleme yapılamaz</span>
      </div>
    </section>

    <section className="rules-grid" data-rules-grid>
      <div className="rules-stack">
        <div className="rules-card rules-note-orange">
          <div className="panel-head">NASIL OYNANIR?</div>
          <p className="rules-lead">
            Kayıt olduktan sonra "Benim Sayfam" bölümünden her maç için skor tahmini yapabilirsin.
            Tahminler maç başlamadan <strong style={{color:'var(--or)'}}>60 dakika öncesine</strong> kadar açıktır.
            Süre dolduğunda tahminler kilitlenir ve yalnızca görüntülenebilir.
          </p>
        </div>

        <div className="rules-card">
          <div className="panel-head">PUAN KURALLARI</div>
          <div style={{marginTop:8}}>
            {rules.map((r,i)=><div key={i} className="rule-card">
              <span style={{fontSize:14,flexShrink:0,marginTop:2,color:'var(--or)'}}>{r.icon}</span>

              <div className={`rule-pts ${r.c}`}>{r.pts}</div>

      <div className="rules-stack">

        <div className="rules-card rules-note-orange">
          <div className="panel-head">ÖNEMLİ NOTLAR</div>
          <ul className="rules-notes">
            <li>Kilitlenen tahminler Ana Sayfa'da herkese görünür.</li>
            <li>Kırmızı kart ve penaltı olayları normal süre + uzatma için geçerlidir.</li>
            <li>Şampiyon tahmini turnuvanın ilk maçına kadar değiştirilebilir.</li>
            <li>Aynı puan/averajda ST değeri yüksek olan üst sırada yer alır.</li>
            <li>Canlı skor ve maç sonuçları yalnızca otomatik veri entegrasyonu ile güncellenir.</li>

          </ul>

        <div className="rules-card rules-note-blue">
          <div className="panel-head">12 SERİ BAŞI TAKIM</div>
          <div className="rules-chips">

          </div>
        </div>
      </div>
    </section>
  </div>;
}
/*  ROOT  */
function App(){
  const [user,setUser]=useState(undefined);
  useEffect(()=>{ensureMertAdmin();const s=S.get('session');if(s){const u=(S.get('users')||{})[s.username];setUser(u||null)}else setUser(null)},[]);
  if(user===undefined)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg0)',flexDirection:'column',gap:16}}><div style={{fontSize:48,animation:'spin 1.2s linear infinite'}}></div><style>{'@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}'}</style><div style={{fontFamily:"'Bebas Neue'",fontSize:16,letterSpacing:'.2em',color:'var(--tm)'}}>YÜKLENİYOR...</div></div>;
  if(!user)return<AuthScreen onLogin={setUser}/>;
  return<ToastProvider><MainApp currentUser={user} onLogout={()=>setUser(null)}/></ToastProvider>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
